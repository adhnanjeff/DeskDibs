spring:
  application:
    name: deskdibs

  # Every value comes from the environment with a safe localhost default.
  # DB_PASSWORD has no default on purpose: the app must fail loudly rather than
  # start against an unexpected database. Real values live in the gitignored .env.
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:deskdibs}
    username: ${DB_USER:deskdibs}
    password: ${DB_PASSWORD}
    hikari:
      pool-name: deskdibs-pool
      maximum-pool-size: ${DB_POOL_SIZE:20}

  # Flyway owns the schema. Hibernate only checks that its mappings match what
  # Flyway built — never `update`, never `create`.
  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  cache:
    type: caffeine

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

deskdibs:
  # Identity. `provider` binds to an enum, so AUTH_PROVIDER=entar stops the
  # application at startup instead of leaving it running with no provider — or,
  # far worse, silently accepting development passwords in production.
  #
  # DESKDIBS_JWT_SECRET and DEV_SEED_PASSWORD deliberately have no default here.
  # A signing key committed to a repository is a signing key anyone can forge
  # tokens with; a default dev password is an account anyone can walk into. Blank
  # means "generate an ephemeral key" and "seed nothing" respectively — both of
  # which say so in the log.
  auth:
    provider: ${AUTH_PROVIDER:local}
    local:
      jwt-secret: ${DESKDIBS_JWT_SECRET:}
      token-ttl: ${DESKDIBS_JWT_TTL:PT8H}
      issuer: ${DESKDIBS_JWT_ISSUER:deskdibs-local}
      audience: ${DESKDIBS_JWT_AUDIENCE:deskdibs-api}
      seed-dev-users: ${DEV_SEED_USERS:true}
      seed-password: ${DEV_SEED_PASSWORD:}
    entra:
      tenant-id: ${ENTRA_TENANT_ID:}
      client-id: ${ENTRA_CLIENT_ID:}
      # Overrides for a sovereign cloud only; derived from the tenant when blank.
      issuer: ${ENTRA_ISSUER:}
      jwk-set-uri: ${ENTRA_JWK_SET_URI:}

  # Office rules are configuration, never hardcoded. Dates and cut-offs resolve
  # server-side in this timezone; the client clock is never trusted.
  office:
    timezone: ${OFFICE_TIMEZONE:Asia/Kolkata}
    booking-horizon-days: ${BOOKING_HORIZON_DAYS:14}
    team-block-release-time: ${TEAM_BLOCK_RELEASE_TIME:10:00}
    no-show-release-time: ${NO_SHOW_RELEASE_TIME:11:00}

logging:
  level:
    com.deskdibs: INFO
